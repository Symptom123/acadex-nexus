<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>ACADEX — Smart School Management Platform</title>
    <meta name="description" content="ACADEX connects admins, teachers, students and parents in one intelligent platform — with real-time analytics, role-based dashboards, and everything your school needs." />
    <meta name="author" content="ACADEX" />

    <meta property="og:title" content="ACADEX — Smart School Management Platform" />
    <meta property="og:description" content="One platform for your entire school. Role-based dashboards, real-time analytics, and AI-powered insights for admins, teachers, students, and parents." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ACADEX — Smart School Management Platform" />
    <meta name="twitter:description" content="One platform for your entire school. Real-time analytics and role-based dashboards." />
    <meta name="twitter:image" content="/favicon.png" />
  </head>

  <body>
    <div id="root">
      <style>
        #initial-loader {
          position: fixed;
          top: 0; left: 0; width: 100%; height: 100%;
          background: radial-gradient(circle at center, #1a1a24 0%, #050508 100%);
          display: flex; flex-direction: column;
          align-items: center; justify-content: center;
          z-index: 99999;
          font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        .loader-logo-ring {
          position: relative;
          width: 160px;
          height: 160px;
          display: flex;
          align-items: center;
          justify-content: center;
          margin-bottom: 50px;
        }
        
        .loader-logo-ring::before {
          content: '';
          position: absolute;
          inset: 0;
          border-radius: 50%;
          border: 2px solid rgba(255, 255, 255, 0.05);
          border-top: 2px solid rgba(255, 255, 255, 0.8);
          border-right: 2px solid rgba(255, 255, 255, 0.8);
          animation: elegantSpin 2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }
        
        .loader-logo-ring::after {
          content: '';
          position: absolute;
          inset: -14px;
          border-radius: 50%;
          border: 1px solid rgba(255, 255, 255, 0.03);
          border-bottom: 1px solid rgba(255, 255, 255, 0.3);
          animation: elegantSpin 3.5s linear infinite reverse;
        }

        .loader-logo {
          width: 85px; height: auto;
          animation: slowBreath 4s ease-in-out infinite;
        }

        .loader-text {
          font-size: 20px;
          font-weight: 400;
          letter-spacing: 18px;
          margin-right: -18px; /* visually centers despite letter-spacing */
          text-transform: uppercase;
          color: rgba(255, 255, 255, 0.85);
          animation: slowBreath 4s ease-in-out infinite;
        }

        @keyframes elegantSpin {
          0%   { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }

        @keyframes slowBreath {
          0%, 100% { opacity: 0.6; transform: scale(0.98); }
          50% { opacity: 1; transform: scale(1.02); }
        }
      </style>
      <div id="initial-loader">
        <div class="loader-logo-ring">
          <img src="/favicon.png" alt="ACADEX Logo" class="loader-logo" />
        </div>
        <div class="loader-text">ACADEX</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
